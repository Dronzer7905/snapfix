name: Feature request
about: Suggest an idea for Snapfix
title: '[FEAT] '
labels: enhancement
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! We're always looking to improve the AI's analysis and the developer experience.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What is your proposed solution?
      description: A clear and concise description of what you want to happen.
  - type: textarea
    id: alternatives
    attributes:
      label: Any alternatives you've considered?
      description: Have you considered any alternative solutions or features?
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
