name: Bug report
about: Create a report to help us improve Snapfix
title: '[BUG] '
labels: bug
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce it?
      description: Include steps to reproduce and a minimal code snippet if possible.
  - type: textarea
    id: traceback
    attributes:
      label: Traceback (if applicable)
      description: Paste the Python traceback that Snapfix failed to analyze or caused an issue.
      render: python
  - type: input
    id: version
    attributes:
      label: Snapfix Version
      description: Which version of Snapfix are you using? (e.g., 0.2.0)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: checkboxes
    id: check-config
    attributes:
      label: Configuration Check
      options:
        - label: I have checked my `~/.snapfix/config.toml` for errors.
          required: true
        - label: I am using the latest version of Snapfix.
          required: true
